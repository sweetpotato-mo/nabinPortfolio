{{/* 
  Custom head extensions for Nabin Shrestha's portfolio.
  We use inline CSS here to apply a consistent Navy Blue accent (#003399)
  without modifying theme assets or the public/ folder.
*/}}

<style>
  :root {
    /* Primary accent color used across the site */
    --nabin-accent: #003399;
  }

  a,
  a:visited {
    color: var(--nabin-accent);
  }

  a:hover,
  a:focus {
    color: var(--nabin-accent);
    text-decoration-color: var(--nabin-accent);
  }

  /* Section headings and key title elements */
  h1,
  h2,
  .post-title,
  .content .title {
    color: var(--nabin-accent);
  }

  /* Active navigation item underline / accent */
  .navigation a:hover,
  .navigation a:focus,
  .navigation .navigation-item a.active,
  .navigation .navigation-item a[aria-current="page"] {
    color: var(--nabin-accent);
    border-color: var(--nabin-accent);
  }

  /* Accent color for small UI details (buttons, badges, etc.) */
  .button,
  .btn,
  .tag,
  .badge {
    border-color: var(--nabin-accent);
  }

  .button:hover,
  .btn:hover {
    background-color: var(--nabin-accent);
    border-color: var(--nabin-accent);
  }

  /* Projects grid layout */
  .projects-list {
    margin-top: 3rem;
  }

  .projects-intro {
    margin-bottom: 2.5rem;
    max-width: 60rem;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 2rem;
  }

  .project-card {
    display: block;
    text-decoration: none;
    color: inherit;
    border-radius: 0.8rem;
    padding: 1.4rem 1.6rem;
    border: 1px solid rgba(0, 0, 0, 0.06);
    background-color: transparent;
    transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.15s ease;
  }

  .project-card:hover,
  .project-card:focus {
    border-color: var(--nabin-accent);
    background-color: rgba(0, 51, 153, 0.03);
    transform: translateY(-1px);
  }

  [data-theme="dark"] .project-card {
    border-color: rgba(255, 255, 255, 0.1);
    background-color: transparent;
  }

  [data-theme="dark"] .project-card:hover,
  [data-theme="dark"] .project-card:focus {
    border-color: var(--nabin-accent);
    background-color: rgba(0, 51, 153, 0.12);
  }

  .project-title {
    margin-top: 0;
    margin-bottom: 0.4rem;
    font-size: 1.9rem;
  }

  .project-meta {
    margin: 0 0 0.8rem 0;
    font-size: 1.3rem;
    color: #666;
  }

  [data-theme="dark"] .project-meta {
    color: #aaa;
  }

  .project-summary {
    margin: 0;
    font-size: 1.4rem;
    line-height: 1.5;
  }
</style>
